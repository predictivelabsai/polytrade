services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "4000:4000"
    environment:
      - MODEL=${MODEL:-grok-4-fast-reasoning}
      - MODEL_PROVIDER=${MODEL_PROVIDER:-xai}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - FINANCIAL_DATA_PROVIDER=${FINANCIAL_DATA_PROVIDER:-}
      - FINANCIAL_DATASETS_API_KEY=${FINANCIAL_DATASETS_API_KEY:-}
      - MASSIVE_API_KEY=${MASSIVE_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - POLYMARKET_WALLET_PRIVATE_KEY=${POLYMARKET_WALLET_PRIVATE_KEY:-}
      - POLYGON_RPC_URL=${POLYGON_RPC_URL:-}
      - TOMORROWIO_API_KEY=${TOMORROWIO_API_KEY:-}
      - VISUAL_CROSSING_API_KEY=${VISUAL_CROSSING_API_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-}
      - POLYCODE_DB_URL=${POLYCODE_DB_URL:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:4000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.fasthtml
    ports:
      - "4002:4002"
    environment:
      - MODEL=${MODEL:-grok-4-fast-reasoning}
      - MODEL_PROVIDER=${MODEL_PROVIDER:-xai}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - FINANCIAL_DATA_PROVIDER=${FINANCIAL_DATA_PROVIDER:-}
      - FINANCIAL_DATASETS_API_KEY=${FINANCIAL_DATASETS_API_KEY:-}
      - MASSIVE_API_KEY=${MASSIVE_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - POLYMARKET_WALLET_PRIVATE_KEY=${POLYMARKET_WALLET_PRIVATE_KEY:-}
      - POLYGON_RPC_URL=${POLYGON_RPC_URL:-}
      - TOMORROWIO_API_KEY=${TOMORROWIO_API_KEY:-}
      - VISUAL_CROSSING_API_KEY=${VISUAL_CROSSING_API_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-}
      - POLYCODE_DB_URL=${POLYCODE_DB_URL:-}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:4002/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  agui:
    build:
      context: .
      dockerfile: Dockerfile.agui
    ports:
      - "4003:4003"
    environment:
      - MODEL=${MODEL:-grok-4-fast-reasoning}
      - MODEL_PROVIDER=${MODEL_PROVIDER:-xai}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - FINANCIAL_DATA_PROVIDER=${FINANCIAL_DATA_PROVIDER:-}
      - FINANCIAL_DATASETS_API_KEY=${FINANCIAL_DATASETS_API_KEY:-}
      - MASSIVE_API_KEY=${MASSIVE_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - POLYMARKET_WALLET_PRIVATE_KEY=${POLYMARKET_WALLET_PRIVATE_KEY:-}
      - POLYGON_RPC_URL=${POLYGON_RPC_URL:-}
      - TOMORROWIO_API_KEY=${TOMORROWIO_API_KEY:-}
      - VISUAL_CROSSING_API_KEY=${VISUAL_CROSSING_API_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-}
      - POLYCODE_DB_URL=${POLYCODE_DB_URL:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:4003/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
